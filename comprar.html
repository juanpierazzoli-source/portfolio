<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comprar — Juan Pierazzoli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arbutus+Slab&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:#3070c9; --green:#51b702; --red:#ca0000; --ink:#000; --paper:#fff;
      --myriad: "Myriad Pro", "Myriad Pro Bold", "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: "Arial Narrow", "Helvetica Neue", Arial, sans-serif;
    }

    /* ===== layout: 2 columnas, mismo tamaño, foto primero / info segunda ===== */
    .checkout {
      display: flex;
      align-items: flex-start;
      gap: 5%;
      max-width: 1500px;
      margin: 0 auto;
      padding: clamp(20px, 4vw, 56px);
    }
    .checkout__left  { flex: 1 1 0; min-width: 0; }
    .checkout__right { flex: 1 1 0; min-width: 0; }

    /* ===== ícono de carrito + total ===== */
    .cart-row {
      display: flex; align-items: center; gap: clamp(10px, 1.4vw, 18px);
      margin-bottom: clamp(16px, 3vw, 32px);
    }
    .cart-head {
      position: relative; container-type: inline-size; flex: 0 0 auto;
      width: clamp(56px, 8vw, 96px);
    }
    .cart-head svg { width: 100%; display: block; }
    /* total de la compra junto al carrito (Myriad Pro Bold) */
    .cart-total-price {
      font-family: var(--myriad);
      font-weight: bold;
      font-size: clamp(18px, 2vw, 28px);
      color: var(--ink);
      line-height: 1;
    }
    /* el círculo del SVG queda en cx=74.7% cy=70.9%, r=46.7% del ancho; el número
       se dimensiona en cqw para seguir SIEMPRE al ícono, nunca al viewport */
    .cart-head__total {
      position: absolute; left: 74.7%; top: 70.9%; transform: translate(-50%, -50%);
      color: #fff; font-weight: bold; font-family: Arial, sans-serif;
      font-size: 25cqw; line-height: 1;
      pointer-events: none;
    }

    /* ===== líneas de producto (foto + badges) ===== */
    .cart-line { margin-bottom: clamp(16px, 2.4vw, 30px); }
    /* container-type: las badges se miden en cqw = % del ancho de la foto,
       así nunca explotan al cambiar el viewport o la cantidad */
    .cart-line__photo { position: relative; container-type: inline-size; }
    /* relación 3:2 igual que el recuadro gris del SVG de referencia: todas las
       fotos quedan del mismo tamaño aunque la fuente tenga otra proporción */
    .cart-line__photo img { width: 100%; aspect-ratio: 1.5; object-fit: cover; display: block; background: #eee; }

    /* badges medidos en cqw (= % del ancho de la foto). Posiciones tomadas del
       SVG: qty azul, "+" verde, "−" rojo (arriba-izq) y "x" rojo (arriba-der) */
    .badge-qty, .badge-plus, .badge-minus, .badge-close {
      position: absolute;
      top: 3cqw;
      width: 7.9cqw; height: 7.9cqw;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      padding: 0; border: none;
      transition: transform .15s ease;
    }
    .badge-plus, .badge-minus, .badge-close { cursor: pointer; }
    .badge-plus:hover, .badge-minus:hover, .badge-close:hover { transform: scale(1.12); }

    .badge-qty   { left: 2.2cqw;  background: var(--blue);  color: #fff; font-weight: bold; font-size: 4.2cqw; line-height: 1; font-family: Arial, sans-serif; }
    .badge-plus  { left: 11.3cqw; background: var(--green); }
    .badge-minus { left: 20.3cqw; background: var(--red); }
    .badge-close { right: 2.2cqw; background: var(--red); }
    .badge-plus svg  { width: 52%; display: block; }
    /* minus y close usan los SVG nuevos (viewBox cuadrado 50.4): el glyph ya
       viene centrado y a escala, ocupa el 100% de la badge */
    .badge-minus svg, .badge-close svg { width: 100%; height: 100%; display: block; }

    /* precio sobre la foto, abajo-izquierda (Myriad Pro Bold) */
    .price-tag {
      position: absolute; left: 0; bottom: 0;
      background: rgba(0,0,0,.6); color: #fff;
      font-family: var(--myriad); font-weight: bold;
      font-size: clamp(13px, 1.5vw, 19px); line-height: 1;
      padding: clamp(5px,0.7vw,9px) clamp(8px,1vw,13px);
      pointer-events: none;
    }

    /* ===== banner BUY ANOTHER PRINT (vector idéntico al SVG de referencia) ===== */
    .banner-add {
      display: flex; align-items: center; justify-content: center;
      background: var(--blue);
      aspect-ratio: 10.53;
      text-decoration: none;
      padding: 0 3%;
      transition: transform .15s ease;
    }
    .banner-add:hover { transform: scale(1.02); }
    .banner-add svg { width: 94.8%; display: block; }

    /* ===== tira de miniaturas: 7 celdas iguales, sin borde, una al lado de la otra ===== */
    .thumb-strip { display: flex; margin-top: 0; }
    .thumb-strip img {
      flex: 1 1 0; min-width: 0;   /* sin min-width:0, el flex item NO baja del
                                      ancho original de la imagen y se desborda */
      width: 100%; aspect-ratio: 1.352; object-fit: cover; display: block;
    }

    .cart-empty { color: #555; font-size: 15px; margin-bottom: 24px; }
    .cart-empty a { color: var(--blue); }

    /* ===== formulario (col. info) =====
       alturas/paddings FIJOS (px clampeados): nada de aspect-ratio ni padding %,
       que es lo que hacía que en desktop se volviera gigante y los botones de
       pago se desbordaran de la columna */
    .field-label {
      display: block;
      font-family: "Arbutus Slab", serif;
      font-size: clamp(22px, 2.1vw, 32px);
      margin: clamp(16px, 1.8vw, 26px) 0 clamp(8px, 0.8vw, 12px);
    }
    .checkout-form input {
      display: block;
      width: 100%;
      height: clamp(44px, 4vw, 60px);
      border: 1px solid #000;
      padding: 0 16px;
      font-size: clamp(14px, 1.3vw, 18px);
      font-family: inherit;
      background: #fff;
    }

    .paymethods { display: flex; gap: 14px; margin-top: clamp(6px, 0.8vw, 12px); }
    .pm {
      flex: 1 1 0; min-width: 0;
      height: clamp(50px, 4.6vw, 70px);
      border: 1px solid #000;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      padding: 0 8px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
    }
    /* las etiquetas vectoriales se miden por ALTURA (son texto): así entran
       siempre, sin importar el ancho de la columna */
    .pm svg { height: clamp(15px, 1.3vw, 19px); width: auto; max-width: 86%; display: block; }
    .pm:hover { transform: scale(1.04); }
    .pm.is-active { background: #eef3fb; border-color: var(--blue); }

    .pay-panel { margin-top: clamp(10px, 1.6vw, 18px); }
    .card-fields label {
      display: block; font-size: 13px; font-weight: normal;
      margin: 10px 0 4px; font-family: Arial, sans-serif;
    }
    .invoice { border: 1px dashed #777; padding: 16px; text-align: center; }
    .invoice__barcode {
      height: 40px; margin: 10px 0;
      background: repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 5px);
    }
    .invoice__code { font-size: 13px; letter-spacing: .1em; font-family: Arial, sans-serif; }

    .confirm {
      display: flex; align-items: center; justify-content: center;
      width: clamp(240px, 48%, 360px);
      height: clamp(54px, 5vw, 76px);
      margin-top: clamp(18px, 2.4vw, 30px);
      background: var(--blue);
      border: none;
      padding: 0 16px;
      cursor: pointer;
      transition: transform .15s ease;
      transform-origin: left center;
    }
    .confirm:hover { transform: scale(1.03); }
    .confirm svg { height: clamp(18px, 1.7vw, 24px); width: auto; display: block; }

    /* mensaje de compra (aparece bajo CONFIRMAR) */
    .order-msg {
      display: none;
      margin-top: clamp(14px, 1.8vw, 22px);
      padding: clamp(12px, 1.4vw, 18px) clamp(14px, 1.6vw, 20px);
      border: 1px solid var(--blue);
      border-left: 5px solid var(--blue);
      background: #eef3fb;
      color: #14305c;
      font-family: Arial, sans-serif;
      font-size: clamp(13px, 1.1vw, 15px);
      line-height: 1.5;
      max-width: clamp(280px, 70%, 520px);
    }
    .order-msg.is-visible { display: block; }
    .order-msg strong { display: block; font-size: 1.15em; margin-bottom: 4px; }
    .order-msg .order-msg__mail { color: var(--blue); font-weight: bold; }

    @media (max-width: 760px) {
      .checkout { flex-direction: column; gap: clamp(28px, 8vw, 48px); }
      .confirm { width: 100%; }
      .order-msg { max-width: 100%; }
    }

    /* misma textura tipo TV / grano que el resto del sitio */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(to bottom,
        rgba(0,0,0,.05) 0px, rgba(0,0,0,.05) 1px, transparent 1px, transparent 3px);
    }
    .grain {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999; opacity: 0.08;
    }
  </style>
</head>

  <script src="cart.js"></script>
  <script>
    // glyphs blancos, viewBox cuadrado centrado: el fondo de color lo aporta la badge
    const PLUS_BADGE_SVG = '<svg viewBox="110.62 214.64 40 40">' +
      '<polygon fill="#fff" points="134.95 230.38 134.95 215.74 126.29 215.74 126.29 230.38 112.26 230.38 112.26 238.77 126.29 238.77 126.29 253.54 134.95 253.54 134.95 238.77 148.98 238.77 148.98 230.38 134.95 230.38"/>' +
      '</svg>';
    // glyphs nuevos provistos por el usuario (Asset 3 = "−", Asset 2 = "x"),
    // viewBox 50.4 cuadrado; sólo el glyph blanco, el fondo lo da la badge
    const MINUS_BADGE_SVG = '<svg viewBox="0 0 50.4 50.4">' +
      '<rect x="12.3" y="21.9" width="25.7" height="6.7" fill="#fff"/>' +
      '</svg>';
    const CLOSE_BADGE_SVG = '<svg viewBox="0 0 50.4 50.4">' +
      '<path fill="#fff" d="M28.7,25l9-10.3h-6.8l-3.7,4.5-.5.6c-.5.6-1,1.2-1.4,1.9-.6-.9-1.2-1.7-2-2.5l-3.7-4.5h-6.9l8.9,10.4-9.3,10.9h6.9l3.8-4.8.6-.8c.5-.6,1-1.2,1.4-1.9.7.9,1.3,1.8,2.1,2.7l3.8,4.7h7l-9.2-11h0v.1Z"/>' +
      '</svg>';

    const PRICE_PER = 10;   // U$D por copia
    const priceLabel = (qty) => (qty * PRICE_PER) + " U$D";

    function makeBadgeButton(cls, html, label, onClick) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = cls;
      b.setAttribute("aria-label", label);
      b.innerHTML = html;
      b.addEventListener("click", onClick);
      return b;
    }

    function renderCart() {
      const items = cartGet();
      const total = cartTotal(items);
      document.getElementById("cartBadge").textContent = total;
      document.getElementById("cartTotalPrice").textContent = priceLabel(total);

      const wrap = document.getElementById("cartItems");
      wrap.innerHTML = "";

      if (items.length === 0) {
        const empty = document.createElement("p");
        empty.className = "cart-empty";
        empty.innerHTML = 'No hay fotos en el carrito. <a href="gauchito.html">Elegí una en la galería</a>.';
        wrap.appendChild(empty);
        return;
      }

      items.forEach((it) => {
        const line = document.createElement("div");
        line.className = "cart-line";

        const photo = document.createElement("div");
        photo.className = "cart-line__photo";

        const qty = document.createElement("span");
        qty.className = "badge-qty";
        qty.textContent = it.qty;

        const plus = makeBadgeButton("badge-plus", PLUS_BADGE_SVG,
          "Agregar otra copia de esta foto", () => { cartInc(it.src); renderCart(); });
        const minus = makeBadgeButton("badge-minus", MINUS_BADGE_SVG,
          "Quitar una copia de esta foto", () => { cartDec(it.src); renderCart(); });
        const close = makeBadgeButton("badge-close", CLOSE_BADGE_SVG,
          "Eliminar esta foto del carrito", () => { cartRemove(it.src); renderCart(); });

        const img = document.createElement("img");
        img.src = it.src;
        img.alt = "Foto seleccionada para imprimir";

        const price = document.createElement("span");
        price.className = "price-tag";
        price.textContent = priceLabel(it.qty);

        photo.appendChild(img);
        photo.appendChild(qty);
        photo.appendChild(plus);
        photo.appendChild(minus);
        photo.appendChild(close);
        photo.appendChild(price);
        line.appendChild(photo);
        wrap.appendChild(line);
      });
    }
    renderCart();

    (function () {
      const strip = document.getElementById("thumbStrip");
      const N = 7;
      for (let i = 1; i <= N; i++) {
        const im = document.createElement("img");
        im.src = "assets/works/gauchito/thumbs/" + String(i).padStart(3, "0") + ".jpg";
        im.loading = "lazy";
        im.alt = "";
        strip.appendChild(im);
      }
    })();

    // hover recolor en BUY ANOTHER PRINT y CONFIRMAR, misma paleta que el resto del sitio
    (function () {
      const COLORS = [
        "hsl(320, 61%, 49%)", "hsl(140, 61%, 49%)", "hsl(35, 61%, 49%)",
        "hsl(270, 61%, 49%)", "hsl(178, 61%, 49%)",
      ];
      const pick = () => COLORS[(Math.random() * COLORS.length) | 0];
      document.querySelectorAll(".banner-add, .confirm").forEach((el) => {
        el.addEventListener("mouseenter", () => { el.style.background = pick(); });
        el.addEventListener("mouseleave", () => { el.style.background = ""; });
      });
    })();

    (function () {
      const buttons = Array.from(document.querySelectorAll(".pm"));
      const panel = document.getElementById("payPanel");

      const CARD_FIELDS =
        '<div class="card-fields">' +
          '<label for="cf-num">NÚMERO DE TARJETA</label>' +
          '<input id="cf-num" type="text" placeholder="•••• •••• •••• ••••" />' +
          '<label for="cf-exp">VENCIMIENTO</label>' +
          '<input id="cf-exp" type="text" placeholder="MM/AA" />' +
          '<label for="cf-cvv">CVV</label>' +
          '<input id="cf-cvv" type="text" placeholder="•••" />' +
          '<label for="cf-hold">TITULAR</label>' +
          '<input id="cf-hold" type="text" />' +
        '</div>';

      const INVOICE =
        '<div class="invoice">' +
          '<p>Factura para pagar en Rapipago / Pago Fácil</p>' +
          '<div class="invoice__barcode" aria-hidden="true"></div>' +
          '<p class="invoice__code">CÓDIGO: 0000 0000 0000 0000</p>' +
        '</div>';

      const PANELS = { debito: CARD_FIELDS, credito: CARD_FIELDS, efectivo: INVOICE };

      buttons.forEach((btn) => {
        btn.addEventListener("click", () => {
          buttons.forEach((b) => b.classList.toggle("is-active", b === btn));
          panel.innerHTML = PANELS[btn.dataset.method];
        });
      });
    })();

    // al confirmar: mostrar mensaje de compra (mockup, no procesa nada)
    (function () {
      const confirmBtn = document.querySelector(".confirm");
      const msg = document.getElementById("orderMsg");
      const mailSpan = document.getElementById("orderMail");
      if (!confirmBtn || !msg) return;
      confirmBtn.addEventListener("click", () => {
        const email = (document.getElementById("cf-email")?.value || "").trim();
        mailSpan.innerHTML = email
          ? ': <span class="order-msg__mail">' + email + '</span>'
          : " que ingresaste";
        msg.classList.add("is-visible");
        msg.scrollIntoView({ behavior: "smooth", block: "nearest" });
      });
    })();

    (function filmGrain() {
      const canvas = document.querySelector("canvas.grain");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const TILE = 256;
      const tile = document.createElement("canvas");
      tile.width = tile.height = TILE;
      const tctx = tile.getContext("2d");
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener("resize", resize, { passive: true });
      function makeNoise() {
        const img = tctx.createImageData(TILE, TILE);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = (Math.random() * 255) | 0;
          d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
        }
        tctx.putImageData(img, 0, 0);
      }
      function paint() {
        makeNoise();
        const pattern = ctx.createPattern(tile, "repeat");
        ctx.save();
        ctx.fillStyle = pattern;
        ctx.translate(-((Math.random() * TILE) | 0), -((Math.random() * TILE) | 0));
        ctx.fillRect(0, 0, canvas.width + TILE, canvas.height + TILE);
        ctx.restore();
      }
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { paint(); return; }
      let last = 0;
      function loop(t) {
        if (t - last > 45) { paint(); last = t; }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
