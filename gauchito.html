<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Gauchito Gil · Juan Pierazzoli</title>
  <style>
    :root { --paper:#fff; --gap: clamp(8px, 1.4vw, 20px); }
    * { box-sizing: border-box; }
    html, body { margin: 0; background: var(--paper); }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      padding: var(--gap);          /* margen de la página = espacio entre fotos */
    }
    .gallery img { width: 100%; height: auto; display: block; background: #eee; }

    /* celular: una abajo de la otra; al corte en los costados, pero
       conserva el mismo espacio vertical entre foto y foto */
    @media (max-width: 700px) {
      .gallery { grid-template-columns: 1fr; padding: 0; /* gap (vertical) se mantiene */ }
    }

    /* botón VOLVER flotante, abajo a la derecha; tamaño ~ CONTACT ME.
       Sigue al mouse en horizontal (el JS aplica el translate). */
    .gback {
      position: fixed;
      bottom: calc(clamp(22px, 5vh, 60px) + 20px);   /* 20px más arriba */
      right: clamp(48px, 15vw, 300px);                /* tirado a la derecha, un poco más al medio */
      z-index: 50;                /* debajo de las texturas (granulado/scanlines) */
      width: min(293px, 80vw);
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, .28));
      will-change: transform;
    }
    .gback svg {
      width: 100%;
      display: block;
      transition: transform .15s ease;
    }
    .gback:hover svg { transform: scale(1.05) rotate(-1.5deg); }
    .gback #volverBg { transition: fill .2s ease; }   /* cambia de color en hover */

    /* misma textura tipo TV que el resto del sitio */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(to bottom,
        rgba(0,0,0,.05) 0px, rgba(0,0,0,.05) 1px, transparent 1px, transparent 3px);
    }
    /* granulado animado, por encima de todo (igual que el main) */
    .grain {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999; opacity: 0.08;
    }
  </style>
</head>

  <script>
    (function () {
      const N = 101;
      const g = document.getElementById("gallery");
      const frag = document.createDocumentFragment();
      for (let i = 1; i <= N; i++) {
        const im = document.createElement("img");
        im.src = "assets/works/gauchito/" + String(i).padStart(3, "0") + ".jpg";
        im.loading = "lazy";
        im.alt = "Gauchito Gil — foto " + i;
        frag.appendChild(im);
      }
      g.appendChild(frag);
    })();

    /* El botón VOLVER sigue al mouse (2D, sólo horizontal, poco movimiento). */
    (function () {
      const btn = document.querySelector(".gback");
      if (!btn) return;
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const MAX = 16;          // px máximo a cada lado (poco movimiento)
      const EASE = 0.12;       // suavizado/lag
      let tx = 0, ty = 0, cx = 0, cy = 0;
      window.addEventListener("mousemove", (e) => {
        tx = e.clientX / window.innerWidth - 0.5;
        ty = e.clientY / window.innerHeight - 0.5;
      }, { passive: true });
      window.addEventListener("mouseleave", () => { tx = 0; ty = 0; });
      function frame() {
        cx += (tx - cx) * EASE;
        cy += (ty - cy) * EASE;
        btn.style.transform =
          "translate(" + (cx * MAX * 2).toFixed(2) + "px," + (cy * MAX * 2).toFixed(2) + "px)";
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      /* en hover: color random de la paleta de trabajos, SIN el azul */
      const rect = document.getElementById("volverBg");
      const COLORS = [
        "hsl(320, 61%, 49%)", // magenta
        "hsl(140, 61%, 49%)", // verde
        "hsl(35, 61%, 49%)",  // naranja
        "hsl(270, 61%, 49%)", // violeta
        "hsl(178, 61%, 49%)", // turquesa
      ];
      btn.addEventListener("mouseenter", () => {
        rect.setAttribute("fill", COLORS[(Math.random() * COLORS.length) | 0]);
      });
      btn.addEventListener("mouseleave", () => {
        rect.setAttribute("fill", "#3070c9");   // vuelve al azul
      });
    })();

    /* Granulado (film grain) en movimiento, igual que el main. */
    (function filmGrain() {
      const canvas = document.querySelector("canvas.grain");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const TILE = 256;
      const tile = document.createElement("canvas");
      tile.width = tile.height = TILE;
      const tctx = tile.getContext("2d");
      function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      resize();
      window.addEventListener("resize", resize, { passive: true });
      function makeNoise() {
        const img = tctx.createImageData(TILE, TILE);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const v = (Math.random() * 255) | 0;
          d[i] = d[i + 1] = d[i + 2] = v; d[i + 3] = 255;
        }
        tctx.putImageData(img, 0, 0);
      }
      function paint() {
        makeNoise();
        const pattern = ctx.createPattern(tile, "repeat");
        ctx.save();
        ctx.fillStyle = pattern;
        ctx.translate(-((Math.random() * TILE) | 0), -((Math.random() * TILE) | 0));
        ctx.fillRect(0, 0, canvas.width + TILE, canvas.height + TILE);
        ctx.restore();
      }
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) { paint(); return; }
      let last = 0;
      function loop(t) {
        if (t - last > 45) { paint(); last = t; }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    })();
  </script>
